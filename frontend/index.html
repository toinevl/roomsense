    <link

      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230d0d0d'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%233987e5' stroke-width='2.4'/%3E%3Ccircle cx='16' cy='16' r='2.4' fill='%2319c37d'/%3E%3C/svg%3E"

  <body>
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" href="#dashboard">
        <span class="brand-mark" aria-hidden="true">
          <span class="brand-ring"></span>
          <span class="brand-dot"></span>
        </span>
        <span class="brand-word">RoomSense</span>
      </a>
      <nav class="primary-nav" aria-label="Primary">
        <a href="#dashboard" data-route="dashboard">Dashboard</a>
        <a href="#live" data-route="live">Live</a>
        <a href="#architecture" data-route="architecture">Architecture</a>
        <a href="#finder" data-route="finder">Find a Room</a>
        <a href="#report" data-route="report">Semester Report</a>
        <a href="#wrapped" data-route="wrapped">Wrapped</a>
        <a href="#trust" data-route="trust">Trust</a>
      </nav>
      <button
        type="button"
        id="mode-toggle"
        class="mode-toggle"
        title="Switch between mock seed data and the live Azure API without redeploying"
      >
        <span id="mode-label">Live</span>
      </button>
      <button
        type="button"
        id="presenter-toggle"
        class="presenter-toggle"
        aria-pressed="false"
        title="Advance the demo clock every 30s so telemetry visibly moves during a presentation. Known limitation: live-mode ticks are currently blocked by an Azure Flex Consumption CORS platform limitation — see the Architecture page."
      >
        <span class="presenter-dot" aria-hidden="true"></span>
        <span id="presenter-label">Presenter mode</span>
      </button>
      <div class="topbar-status" id="topbar-status" aria-live="polite">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-label">connecting…</span>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="site-footer">
      <span>RoomSense — demo build. Occupancy data in this environment is generated, not live sensor traffic.</span>
      <span class="footer-sep">·</span>
      <a href="#architecture">How the data gets here</a>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
