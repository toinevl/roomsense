name: deploy-api

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["api/**", "packages/shared/**"]

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: roomsense-api
  RESOURCE_GROUP: rgRoomSense
  DEPLOY_MODE: ${{ vars.DEPLOY_MODE }}

jobs:
  build-deploy-smoke:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_PUBLISH_PROFILE: ${{ secrets.AZURE_PUBLISH_PROFILE }}
      DEPLOY_MODE: ${{ vars.DEPLOY_MODE }}
    steps:
      - uses: actions/checkout@v4
      - name: Select deploy mode
        id: deploy-mode
        env:
          MODE_INPUT: ${{ env.DEPLOY_MODE }}
        run: |
          MODE="$MODE_INPUT"
          [ -z "$MODE" ] && { echo "::error::DEPLOY_MODE is empty"; exit 1; }
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "MODE=${MODE}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build api
        run: pnpm --filter @roomsense/api build
      - name: Deploy (publish-profile fallback)
        if: steps.deploy-mode.outputs.mode == 'publish-profile'
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail
          echo "AZURE_PUBLISH_PROFILE length: ${#AZURE_FUNCTIONAPP_PUBLISH_PROFILE}"
          PROFILE_XML="$(mktemp)"
          printf '%s' "$AZURE_FUNCTIONAPP_PUBLISH_PROFILE" > "$PROFILE_XML"
          PUBLISH_URL="$(grep -oP 'publishUrl="\K[^"]+' "$PROFILE_XML" | head -n 1)"
          USERNAME="$(grep -oP 'userName="\K[^"]+' "$PROFILE_XML" | head -n 1)"
          PASSWORD="$(grep -oP 'userPWD="\K[^"]+' "$PROFILE_XML" | head -n 1)"
          echo "publishUrl=${PUBLISH_URL}"
          echo "username=${USERNAME}"
          if [ -z "$PUBLISH_URL" ] || [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "Missing publish profile fields"; exit 1
          fi
          ZIP_PATH="/tmp/roomsense-api-$(date +%s).zip"
          tmpdir="$(mktemp -d)"
          cp api/host.json api/package.json "$tmpdir/"
          cp -r api/src api/scripts api/vitest.config.ts api/dist "$tmpdir/" 2>/dev/null || true
          (cd "$tmpdir" && zip -X -r "$ZIP_PATH" . >/dev/null 2>&1)
          echo "Zip size: $(stat -c%s "$ZIP_PATH")"
          FULL_URL="https://${PUBLISH_URL}"
          if [ "$FULL_URL" != "$PUBLISH_URL" ]; then
            AZURE_URL="$FULL_URL/api/zipdeploy"
          else
            AZURE_URL="https://${PUBLISH_URL}/api/zipdeploy"
          fi
          echo "zipdeploy_url=${AZURE_URL}"
          MS_DEPLOY_URL="$AZURE_URL" ZIP_PATH="$ZIP_PATH" ZIP_USER="$USERNAME" ZIP_PASS="$PASSWORD" node infra/publish-profile-deploy.mjs
      - name: Az login (OIDC)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Enable SCM basic auth (standing lesson)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        run: |
          az resource update --resource-group "$RESOURCE_GROUP" --name scm --namespace Microsoft.Web --resource-type basicPublishingCredentialsPolicies --parent "sites/$APP_NAME" --set properties.allow=true || true
      - name: Stage self-contained deploy package
        if: steps.deploy-mode.outputs.mode == 'oidc'
        # api/dist holds ONLY the esbuild bundle — the host also needs host.json,
        # a package.json whose main points at the bundle, and @azure/functions
        # (the one dep the bundle externalizes). Remote/Oryx build is off: it
        # cannot resolve the workspace:* dep and Flex has no Kudu build anyway.
        run: |
          set -euo pipefail
          rm -rf api/deploy-pkg && mkdir -p api/deploy-pkg
          cp api/host.json api/deploy-pkg/
          cp -r api/dist api/deploy-pkg/dist
          node -e "
            const p = require('./api/package.json');
            require('fs').writeFileSync('api/deploy-pkg/package.json', JSON.stringify({
              name: p.name, version: p.version, main: 'dist/src/index.js',
              dependencies: { '@azure/functions': p.dependencies['@azure/functions'] }
            }, null, 2));
          "
          cd api/deploy-pkg && npm install --omit=dev --no-audit --no-fund
      - name: Deploy to Functions (OIDC)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.APP_NAME }}
          package: api/deploy-pkg
          scm-do-build-during-deployment: false
          enable-oryx-build: false
          remote-build: false
      - name: Add CORS for SWA (idempotent guard with cors show)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        run: |
          SWA_HOSTNAME="${{ vars.ROOMSENSE_SWA_URL }}"
          if [ -z "$SWA_HOSTNAME" ]; then echo "Warning: ROOMSENSE_SWA_URL not set, skipping CORS add"; exit 0; fi
          EXISTING=$(az functionapp cors show --resource-group "$RESOURCE_GROUP" --name "$APP_NAME" -o tsv --query "allowedOrigins" 2>/dev/null || echo "")
          if echo "$EXISTING" | grep -q "$SWA_HOSTNAME"; then echo "CORS already configured for $SWA_HOSTNAME"; else echo "Adding CORS for $SWA_HOSTNAME"; az functionapp cors add --resource-group "$RESOURCE_GROUP" --name "$APP_NAME" --allowed-origins "$SWA_HOSTNAME"; fi
      - name: Wait for warmup (cold start ~60s lesson)
        run: sleep 60
      - name: Smoke test (health endpoint with 90s retry tolerance)
        env:
          SMOKE_BASE: https://${{ env.APP_NAME }}.azurewebsites.net
        run: |
          API_URL="${SMOKE_BASE}/api/health"
          MAX_RETRIES=6
          RETRY_DELAY=15

          echo "Starting API smoke test..."

          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" "$API_URL")
            body=$(echo "$response" | head -n -1)
            status=$(echo "$response" | tail -n 1)

            if [ "$status" = "200" ]; then
              echo "✓ GET /api/health → $status (OK)"
              exit 0
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Attempt $i/$MAX_RETRIES returned $status, waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "✗ Health check failed after $((MAX_RETRIES * RETRY_DELAY)) seconds"
          exit 1
