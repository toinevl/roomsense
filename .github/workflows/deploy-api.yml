name: deploy-api

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["api/**", "packages/shared/**"]

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: roomsense-api
  RESOURCE_GROUP: rgRoomSense
  DEPLOY_MODE: ${{ vars.DEPLOY_MODE }}

jobs:
  build-deploy-smoke:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_PUBLISH_PROFILE: ${{ secrets.AZURE_PUBLISH_PROFILE }}
      DEPLOY_MODE: ${{ vars.DEPLOY_MODE }}
    steps:
      - uses: actions/checkout@v4
      - name: Select deploy mode
        id: deploy-mode
        env:
          MODE_INPUT: ${{ env.DEPLOY_MODE }}
        run: |
          MODE="$MODE_INPUT"
          [ -z "$MODE" ] && { echo "::error::DEPLOY_MODE is empty"; exit 1; }
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "MODE=${MODE}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build api
        run: pnpm --filter @roomsense/api build
      - name: Deploy (publish-profile fallback)
        if: steps.deploy-mode.outputs.mode == 'publish-profile'
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail
          PROFILE_FILE="$(mktemp)"
          printf '%s' "$AZURE_FUNCTIONAPP_PUBLISH_PROFILE" > "$PROFILE_FILE"
          PUBLISH_URL="$(grep -oP 'publishUrl="\K[^"]+' "$PROFILE_FILE" | head -n 1)"
          USERNAME="$(grep -oP 'userName="\K[^"]+' "$PROFILE_FILE" | head -n 1)"
          PASSWORD="$(grep -oP 'userPWD="\K[^"]+' "$PROFILE_FILE" | head -n 1)"
          if [ -z "$PUBLISH_URL" ] || [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "Missing publish profile fields"; exit 1
          fi
          ZIP_PATH="/tmp/roomsense-api-$(date +%s).zip"
          tmpdir="$(mktemp -d)"
          cp api/host.json api/package.json "$tmpdir/"
          cp -r api/src api/scripts api/vitest.config.ts api/dist "$tmpdir/" 2>/dev/null || true
          (cd "$tmpdir" && zip -r "$ZIP_PATH" . >/dev/null 2>&1)
          curl -sS -X POST "$PUBLISH_URL/api/zipdeploy" \
            --user "$USERNAME:$PASSWORD" \
            --header "Content-Type: application/zip" \
            --data-binary @"$ZIP_PATH" >/tmp/roomsense-zipdeploy.log
          STATUS="$(tail -n 1 /tmp/roomsense-zipdeploy.log | grep -oP '<status>\K[^<]+' || true)"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ]; then
            echo "Zip deploy failed: $STATUS"; tail -n 20 /tmp/roomsense-zipdeploy.log; exit 1
          fi
          echo "Zip deploy accepted"
      - name: Az login (OIDC)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Enable SCM basic auth (standing lesson)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        run: |
          az resource update --resource-group "$RESOURCE_GROUP" --name scm --namespace Microsoft.Web --resource-type basicPublishingCredentialsPolicies --parent "sites/$APP_NAME" --set properties.allow=true || true
      - name: Deploy to Functions (OIDC)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.APP_NAME }}
          package: api/dist
          scm-do-build-during-deployment: true
          enable-oryx-build: true
      - name: Add CORS for SWA (idempotent guard with cors show)
        if: steps.deploy-mode.outputs.mode == 'oidc'
        run: |
          SWA_HOSTNAME="${{ vars.ROOMSENSE_SWA_URL }}"
          if [ -z "$SWA_HOSTNAME" ]; then echo "Warning: ROOMSENSE_SWA_URL not set, skipping CORS add"; exit 0; fi
          EXISTING=$(az functionapp cors show --resource-group "$RESOURCE_GROUP" --name "$APP_NAME" -o tsv --query "allowedOrigins" 2>/dev/null || echo "")
          if echo "$EXISTING" | grep -q "$SWA_HOSTNAME"; then echo "CORS already configured for $SWA_HOSTNAME"; else echo "Adding CORS for $SWA_HOSTNAME"; az functionapp cors add --resource-group "$RESOURCE_GROUP" --name "$APP_NAME" --allowed-origins "$SWA_HOSTNAME"; fi
      - name: Wait for warmup (cold start ~60s lesson)
        run: sleep 60
      - name: Smoke test (health endpoint with 90s retry tolerance)
        env:
          SMOKE_BASE: https://${{ env.APP_NAME }}.azurewebsites.net
        run: |
          API_URL="${SMOKE_BASE}/api/health"
          MAX_RETRIES=6
          RETRY_DELAY=15

          echo "Starting API smoke test..."

          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" "$API_URL")
            body=$(echo "$response" | head -n -1)
            status=$(echo "$response" | tail -n 1)

            if [ "$status" = "200" ]; then
              echo "✓ GET /api/health → $status (OK)"
              exit 0
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Attempt $i/$MAX_RETRIES returned $status, waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "✗ Health check failed after $((MAX_RETRIES * RETRY_DELAY)) seconds"
          exit 1
