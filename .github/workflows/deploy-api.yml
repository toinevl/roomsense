name: deploy-api

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["api/**", "packages/shared/**"]

permissions:
  id-token: write
  contents: read

env:
  # Required GitHub Actions secrets (set via Settings → Secrets and variables → Actions):
  # - AZURE_CLIENT_ID: app registration's application (client) ID
  # - AZURE_TENANT_ID: AAD tenant ID
  # - AZURE_SUBSCRIPTION_ID: subscription ID holding rgRoomSense
  #
  # Required GitHub Actions repo variables:
  # - ROOMSENSE_API_URL: deployed Function App URL (e.g. https://roomsense-api.azurewebsites.net)
  #
  # Setup: see infra/RECOVERY.md for OIDC federated credential creation steps.
  APP_NAME: roomsense-api
  RESOURCE_GROUP: rgRoomSense

jobs:
  build-deploy-smoke:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard required secrets
        run: |
          for v in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!v}" ]; then echo "Missing secret $v"; exit 1; fi
          done
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build api
        run: pnpm --filter @roomsense/api build
      - name: Az login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Enable SCM basic auth (standing lesson)
        run: |
          az resource update --resource-group "$RESOURCE_GROUP" --name scm --namespace Microsoft.Web --resource-type basicPublishingCredentialsPolicies --parent "sites/$APP_NAME" --set properties.allow=true || true
      - name: Deploy to Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.APP_NAME }}
          package: api/dist
          scm-do-build-during-deployment: true
          enable-oryx-build: true
      - name: Add CORS for SWA (idempotent guard with cors show)
        run: |
          # Get deployed SWA hostname from output or repo variable
          SWA_HOSTNAME="${{ vars.ROOMSENSE_SWA_URL }}"
          if [ -z "$SWA_HOSTNAME" ]; then
            echo "Warning: ROOMSENSE_SWA_URL not set, skipping CORS add"
            exit 0
          fi

          # Check if CORS is already set
          EXISTING=$(az functionapp cors show --resource-group "$RESOURCE_GROUP" --name "$APP_NAME" -o tsv --query "allowedOrigins" 2>/dev/null || echo "")

          if echo "$EXISTING" | grep -q "$SWA_HOSTNAME"; then
            echo "CORS already configured for $SWA_HOSTNAME"
          else
            echo "Adding CORS for $SWA_HOSTNAME"
            az functionapp cors add --resource-group "$RESOURCE_GROUP" --name "$APP_NAME" --allowed-origins "$SWA_HOSTNAME"
          fi
      - name: Wait for warmup (cold start ~60s lesson)
        run: sleep 60
      - name: Smoke test (health endpoint with 90s retry tolerance)
        env:
          SMOKE_BASE: https://${{ env.APP_NAME }}.azurewebsites.net
        run: |
          API_URL="${SMOKE_BASE}/api/health"
          MAX_RETRIES=6
          RETRY_DELAY=15

          echo "Starting API smoke test..."

          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" "$API_URL")
            body=$(echo "$response" | head -n -1)
            status=$(echo "$response" | tail -n 1)

            if [ "$status" = "200" ]; then
              echo "✓ GET /api/health → $status (OK)"
              exit 0
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Attempt $i/$MAX_RETRIES returned $status, waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "✗ Health check failed after $((MAX_RETRIES * RETRY_DELAY)) seconds"
          exit 1
