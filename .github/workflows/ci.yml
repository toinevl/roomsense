name: ci

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install
        # --no-frozen-lockfile while Phase 1 lanes land: parallel agents (Claude
        # frontend, Hermes api) share one lockfile in the same tree, so the
        # lockfile can be ahead of what's committed. TODO(#22): revert to
        # --frozen-lockfile once both lanes are merged.
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
